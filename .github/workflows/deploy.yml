name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BASE_HREF: /${{ github.event.repository.name }}/
      BUILD_VERSION: ${{ github.run_number }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Append build version query param to assets
        run: |
          node -e "const fs=require('fs'); const file='dist/bg-parallel-count/browser/index.html'; const version=process.env.BUILD_VERSION || Date.now().toString(); let html=fs.readFileSync(file,'utf8'); html=html.replace(/(src|href)=\"([^\"]+\.(?:js|css))(?:\?[^\"]*)?\"/g, (_m, attr, url) => `${attr}=\"${url}?v=${version}\"`); fs.writeFileSync(file, html);"

      - name: Copy index.html to 404.html
        run: cp dist/bg-parallel-count/browser/index.html dist/bg-parallel-count/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/bg-parallel-count/browser

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
